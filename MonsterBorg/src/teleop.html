<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>MonsterBorg Teleop</title>

    <style>

        body {

            margin: 0;
            padding: 0;

            font-family: Arial, sans-serif;

            background-image: url("/static/dog.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: white;
            text-align: center;
        }

        .overlay {

            min-height: 100vh;

            background: rgba(0, 0, 0, 0.55);

            padding: 20px;
        }

        h1 {

            margin-top: 10px;
            font-size: 42px;

            text-shadow: 2px 2px 6px black;
        }

        .panel {

            display: inline-block;

            background: rgba(20, 20, 20, 0.7);

            padding: 25px;

            border-radius: 20px;

            box-shadow: 0 0 20px rgba(0,0,0,0.5);

            margin-top: 20px;
        }

        .row {

            display: flex;
            justify-content: center;

            margin: 10px;
        }

        button {

            width: 110px;
            height: 110px;

            margin: 10px;

            border: none;
            border-radius: 20px;

            font-size: 28px;

            background: #2f2f2f;

            color: white;

            transition: 0.15s;

            touch-action: manipulation;
        }

        button:hover {

            transform: scale(1.05);
        }

        button:active {

            transform: scale(0.95);

            background: #666;
        }

        .bark {

            background: #b22222;
        }

        .status {

            margin-top: 25px;

            font-size: 22px;

            text-shadow: 1px 1px 4px black;
        }

        .slider-container {

            margin-top: 20px;
            margin-bottom: 10px;
        }

        input[type=range] {

            width: 300px;
        }

        @media (max-width: 700px) {

            button {

                width: 90px;
                height: 90px;

                font-size: 24px;
            }
        }

    </style>
</head>

<body>

<div class="overlay">

    <h1>MonsterBorg Teleop</h1>

    <div class="panel">

        <div class="slider-container">

            <div>
                Power:
                <span id="powerValue">0.5</span>
            </div>

            <input
                type="range"
                id="powerSlider"
                min="0.1"
                max="1.0"
                step="0.1"
                value="0.5"
            >
        </div>

        <div class="row">
            <button id="forward">W</button>
        </div>

        <div class="row">
            <button id="left">A</button>
            <button class="bark" id="bark">BARK</button>
            <button id="right">D</button>
        </div>

        <div class="row">
            <button id="backward">S</button>
        </div>

        <div class="status" id="status">
            Ready
        </div>

    </div>

</div>

<script>

const API_KEY = "supersecret";

let interval = null;

const statusText = document.getElementById("status");

const powerSlider =
    document.getElementById("powerSlider");

const powerValue =
    document.getElementById("powerValue");

powerSlider.addEventListener("input", function() {

    powerValue.innerText = powerSlider.value;
});

function getPower() {

    return parseFloat(powerSlider.value);
}

async function sendDrive(left, right) {

    try {

        await fetch("/drive", {

            method: "POST",

            headers: {

                "Content-Type": "application/json",
                "X-API-Key": API_KEY
            },

            body: JSON.stringify({

                left: left,
                right: right
            })
        });

    } catch (err) {

        console.error(err);

        statusText.innerText =
            "Connection Error";
    }
}

async function stopRobot() {

    try {

        await fetch("/stop", {

            method: "POST",

            headers: {

                "X-API-Key": API_KEY
            }
        });

        statusText.innerText = "Stopped";

    } catch (err) {

        console.error(err);
    }
}

async function bark() {

    try {

        await fetch("/bark", {

            method: "POST",

            headers: {

                "X-API-Key": API_KEY
            }
        });

        statusText.innerText = "BARK!";

    } catch (err) {

        console.error(err);
    }
}

function startDriving(left, right, label) {

    clearInterval(interval);

    sendDrive(left, right);

    interval = setInterval(function() {

        sendDrive(left, right);

    }, 100);

    statusText.innerText = label;
}

function stopDriving() {

    clearInterval(interval);

    interval = null;

    stopRobot();
}

function bindButton(id, leftFunc, rightFunc, label) {

    const btn = document.getElementById(id);

    const start = function() {

        startDriving(
            leftFunc(),
            rightFunc(),
            label
        );
    };

    btn.addEventListener("mousedown", start);

    btn.addEventListener("mouseup", stopDriving);

    btn.addEventListener("mouseleave", stopDriving);

    btn.addEventListener("touchstart", function(e) {

        e.preventDefault();

        start();
    });

    btn.addEventListener("touchend", function(e) {

        e.preventDefault();

        stopDriving();
    });
}

bindButton(
    "forward",

    () => getPower(),
    () => getPower(),

    "Forward"
);

bindButton(
    "backward",

    () => -getPower(),
    () => -getPower(),

    "Backward"
);

bindButton(
    "left",

    () => -getPower(),
    () => getPower(),

    "Turning Left"
);

bindButton(
    "right",

    () => getPower(),
    () => -getPower(),

    "Turning Right"
);

document.getElementById("bark")
.addEventListener("click", bark);

document.addEventListener("keydown", function(e) {

    if (interval)
        return;

    const p = getPower();

    if (e.key === "w") {

        startDriving(p, p, "Forward");
    }

    else if (e.key === "s") {

        startDriving(-p, -p, "Backward");
    }

    else if (e.key === "a") {

        startDriving(-p, p, "Turning Left");
    }

    else if (e.key === "d") {

        startDriving(p, -p, "Turning Right");
    }
});

document.addEventListener("keyup", stopDriving);

</script>

</body>
</html>
